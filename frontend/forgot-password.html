<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Request a password reset for your EasyCart SME account." />
  <title>Reset Password — EasyCart SME</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: radial-gradient(circle at top left, rgba(var(--primary-rgb), 0.05), transparent),
        radial-gradient(circle at bottom right, rgba(var(--accent-rgb), 0.05), transparent);
    }
  </style>
</head>

<body>

  <div class="card" style="width: 100%; max-width: 440px; padding: 2.5rem;">
    <!-- Logo -->
    <div style="text-align: center; margin-bottom: 2rem;">
      <a href="index.html" class="navbar-brand" style="justify-content: center;">
        <div class="logo-icon"><i class="fas fa-shopping-cart"></i></div>
        <span class="brand-name">Easy<span>Cart</span></span>
      </a>
      <h3 style="margin-top: 1.5rem; margin-bottom: 0.5rem; font-weight: 600;">Forgot Password?</h3>
      <p style="color: var(--text-muted); font-size: 0.9rem;">
        Enter your email address and we'll send you instructions to reset your password.
      </p>
    </div>

    <!-- Alert -->
    <div id="auth-alert" class="alert" style="display:none; margin-bottom: 1.5rem;"></div>

    <!-- REQUEST RESET FORM -->
    <form id="forgot-form">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" id="forgot-email" class="form-control" placeholder="you@email.com" required />
      </div>
      <button type="submit" class="btn btn-primary w-full btn-lg mt-4" id="forgot-btn">Send Reset Link</button>
    </form>

    <div style="text-align: center; margin-top: 2rem;">
      <a href="login.html" style="color: var(--text-muted); font-size: 0.85rem; font-weight: 500; text-decoration: none;">
        ← Back to Sign In
      </a>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script>
    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('forgot-email').value.trim();
      const btn = document.getElementById('forgot-btn');
      const alert = document.getElementById('auth-alert');

      btn.disabled = true;
      btn.textContent = 'Sending...';
      alert.style.display = 'none';

      try {
        // We will call the Auth forgot-password API
        await apiFetch('/auth/forgot-password', {
          method: 'POST',
          body: { email }
        });

        alert.textContent = 'If an account exists with that email, a password reset link has been sent.';
        alert.className = 'alert alert-success';
        alert.style.display = 'block';
        btn.textContent = 'Link Sent';
      } catch (err) {
        alert.textContent = err.message || 'Failed to request password reset. Please try again.';
        alert.className = 'alert alert-danger';
        alert.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Send Reset Link';
      }
    });
  </script>

</body>

</html>
