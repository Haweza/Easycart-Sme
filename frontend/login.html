<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Sign in or create an EasyCart SME account." />
  <title>Sign In — EasyCart SME</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: radial-gradient(circle at top left, rgba(var(--primary-rgb), 0.05), transparent),
                  radial-gradient(circle at bottom right, rgba(var(--accent-rgb), 0.05), transparent);
    }
  </style>
</head>
<body>

<div class="card" style="width: 100%; max-width: 440px; padding: 2.5rem;">
  <!-- Logo -->
  <div style="text-align: center; margin-bottom: 2rem;">
    <a href="index.html" class="navbar-brand" style="justify-content: center;">
      <div class="logo-icon"><i class="fas fa-shopping-cart"></i></div>
      <span class="brand-name">Easy<span>Cart</span></span>
    </a>
    <p id="auth-tagline" style="color: var(--text-muted); font-size: 0.9rem; margin-top: 8px;">Sign in to your account</p>
  </div>

  <!-- Tabs (Styled as segmented control) -->
  <div style="display: flex; background: var(--bg-subtle); padding: 4px; border-radius: var(--radius); margin-bottom: 2rem;">
    <button class="btn btn-sm w-full" id="tab-login" style="background: var(--surface); box-shadow: var(--shadow-sm); color: var(--text);" onclick="switchTab('login')">Sign In</button>
    <button class="btn btn-sm w-full" id="tab-register" style="background: transparent; color: var(--text-muted);" onclick="switchTab('register')">Register</button>
  </div>

  <!-- Alert -->
  <div id="auth-alert" class="alert" style="display:none; margin-bottom: 1.5rem;"></div>

  <!-- LOGIN FORM -->
  <form id="login-form">
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input type="email" id="login-email" class="form-control" placeholder="you@email.com" required />
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" id="login-password" class="form-control" placeholder="••••••••" required />
    </div>
    <button type="submit" class="btn btn-primary w-full btn-lg mt-4" id="login-btn">Sign In</button>
  </form>

  <!-- REGISTER FORM -->
  <form id="register-form" style="display:none">
    <div class="form-group">
      <label class="form-label">Full Name</label>
      <input type="text" id="reg-name" class="form-control" placeholder="John Banda" required />
    </div>
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input type="email" id="reg-email" class="form-control" placeholder="you@email.com" required />
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" id="reg-password" class="form-control" placeholder="Min 8 characters" required />
    </div>
    <button type="submit" class="btn btn-primary w-full btn-lg mt-4" id="register-btn">Create Account</button>
  </form>

  <div style="text-align: center; margin-top: 2rem;">
    <a href="index.html" style="color: var(--text-muted); font-size: 0.85rem; font-weight: 500;">← Back to Homepage</a>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script>
// Logic remains same, just updating UI hooks
if (isLoggedIn()) redirectByRole();

function switchTab(tab) {
  const isLogin = tab === 'login';
  document.getElementById('login-form').style.display    = isLogin ? 'block' : 'none';
  document.getElementById('register-form').style.display = isLogin ? 'none'  : 'block';
  
  const tL = document.getElementById('tab-login');
  const tR = document.getElementById('tab-register');
  
  if(isLogin) {
    tL.style.background = 'var(--surface)'; tL.style.boxShadow = 'var(--shadow-sm)'; tL.style.color = 'var(--text)';
    tR.style.background = 'transparent'; tR.style.boxShadow = 'none'; tR.style.color = 'var(--text-muted)';
  } else {
    tR.style.background = 'var(--surface)'; tR.style.boxShadow = 'var(--shadow-sm)'; tR.style.color = 'var(--text)';
    tL.style.background = 'transparent'; tL.style.boxShadow = 'none'; tL.style.color = 'var(--text-muted)';
  }
  document.getElementById('auth-tagline').textContent = isLogin ? 'Sign in to your account' : 'Create your free account';
}

if (window.location.hash === '#register') switchTab('register');

// Handle forms... (same logic as before)
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'Signing in...';
  try {
    const res = await Auth.login({ email, password });
    setAuth(res.token, res.user);
    window.location.replace('index.html');
  } catch (err) {
    const alert = document.getElementById('auth-alert');
    alert.textContent = err.message || 'Login failed. Check your credentials.'; 
    alert.className = 'alert alert-danger'; alert.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Sign In';
  }
});

document.getElementById('register-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  const btn = document.getElementById('register-btn');
  btn.disabled = true; btn.textContent = 'Creating account...';
  try {
    const res = await Auth.register({ fullName: name, email, password });
    setAuth(res.token, res.user);
    window.location.replace('index.html');
  } catch (err) {
    const alert = document.getElementById('auth-alert');
    alert.textContent = err.message || 'Registration failed.'; 
    alert.className = 'alert alert-danger'; alert.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Create Account';
  }
});
</script>

</body>
</html>
