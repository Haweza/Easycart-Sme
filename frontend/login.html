<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Sign in or create an EasyCart SME account." />
  <title>Sign In — EasyCart SME</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="auth-page">

<div class="auth-box fade-in">

  <!-- Logo -->
  <div class="auth-logo">
    <a href="index.html">
      <div class="logo-mark">EC</div>
    </a>
    <h1>Easy<span style="color:var(--yellow-dark)">Cart</span> SME</h1>
    <p id="auth-tagline">Sign in to your account</p>
  </div>

  <!-- Tabs -->
  <div class="auth-tabs" role="tablist">
    <button class="auth-tab active" id="tab-login"    role="tab" onclick="switchTab('login')">Sign In</button>
    <button class="auth-tab"        id="tab-register" role="tab" onclick="switchTab('register')">Create Account</button>
  </div>

  <!-- Alert -->
  <div id="auth-alert" class="alert" style="display:none"></div>

  <!-- LOGIN FORM -->
  <form id="login-form" novalidate>
    <div class="form-group">
      <label class="form-label" for="login-email">Email address</label>
      <input type="email" id="login-email" class="form-control" placeholder="you@example.com" required autocomplete="email" />
      <div class="form-error" id="login-email-err">Please enter a valid email</div>
    </div>
    <div class="form-group">
      <label class="form-label" for="login-password">Password</label>
      <input type="password" id="login-password" class="form-control" placeholder="••••••••" required autocomplete="current-password" />
      <div class="form-error" id="login-pass-err">Password is required</div>
    </div>
    <button type="submit" class="btn btn-primary w-full btn-lg" id="login-btn">
      Sign In
    </button>
  </form>

  <!-- REGISTER FORM -->
  <form id="register-form" style="display:none" novalidate>
    <div class="form-group">
      <label class="form-label" for="reg-name">Full name</label>
      <input type="text" id="reg-name" class="form-control" placeholder="John Banda" required autocomplete="name" />
      <div class="form-error" id="reg-name-err">Full name is required</div>
    </div>
    <div class="form-group">
      <label class="form-label" for="reg-email">Email address</label>
      <input type="email" id="reg-email" class="form-control" placeholder="you@example.com" required autocomplete="email" />
      <div class="form-error" id="reg-email-err">Please enter a valid email</div>
    </div>
    <div class="form-group">
      <label class="form-label" for="reg-phone">Phone (optional)</label>
      <input type="tel" id="reg-phone" class="form-control" placeholder="+260 97 000 0000" autocomplete="tel" />
    </div>
    <div class="form-group">
      <label class="form-label" for="reg-password">Password</label>
      <input type="password" id="reg-password" class="form-control" placeholder="Min. 8 characters" required autocomplete="new-password" />
      <div class="form-error" id="reg-pass-err">Password must be at least 8 characters</div>
    </div>
    <div class="form-group">
      <label class="form-label" for="reg-confirm">Confirm password</label>
      <input type="password" id="reg-confirm" class="form-control" placeholder="••••••••" required autocomplete="new-password" />
      <div class="form-error" id="reg-confirm-err">Passwords do not match</div>
    </div>
    <button type="submit" class="btn btn-primary w-full btn-lg" id="register-btn">
      Create Account — It's Free
    </button>
    <p class="text-sm text-muted mt-4" style="text-align:center">
      By signing up you agree to our <a href="#" style="color:var(--blue);text-decoration:underline">Terms of Service</a>
    </p>
  </form>

  <div class="auth-divider">or</div>
  <p class="text-sm text-muted" style="text-align:center">
    <a href="index.html" style="color:var(--blue);font-weight:600">← Back to Homepage</a>
  </p>

</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script>
// ---- If already logged in, redirect -----------------------
if (isLoggedIn()) redirectByRole();

// ---- Tab switching ----------------------------------------
function switchTab(tab) {
  const isLogin = tab === 'login';
  document.getElementById('login-form').style.display    = isLogin ? 'block' : 'none';
  document.getElementById('register-form').style.display = isLogin ? 'none'  : 'block';
  document.getElementById('tab-login').classList.toggle('active', isLogin);
  document.getElementById('tab-register').classList.toggle('active', !isLogin);
  document.getElementById('auth-tagline').textContent = isLogin
    ? 'Sign in to your account' : 'Create your free account';
  hideAlert();
}

// ---- Auto-switch if URL has #register ---------------------
if (window.location.hash === '#register') switchTab('register');

// ---- Alert helpers ----------------------------------------
function showAlert(msg, type = 'danger') {
  const el = document.getElementById('auth-alert');
  el.className = `alert alert-${type}`;
  el.textContent = msg;
  el.style.display = 'flex';
}
function hideAlert() {
  document.getElementById('auth-alert').style.display = 'none';
}

// ---- LOGIN ------------------------------------------------
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  hideAlert();

  const email    = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  let valid = true;

  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    document.getElementById('login-email-err').classList.add('show'); valid = false;
  } else {
    document.getElementById('login-email-err').classList.remove('show');
  }
  if (!password) {
    document.getElementById('login-pass-err').classList.add('show'); valid = false;
  } else {
    document.getElementById('login-pass-err').classList.remove('show');
  }
  if (!valid) return;

  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'Signing in…';

  try {
    const res = await Auth.login({ email, password });
    setAuth(res.token, res.user);
    showAlert('Login successful! Redirecting…', 'success');
    setTimeout(() => redirectByRole(), 800);
  } catch (err) {
    showAlert(err.message || 'Invalid credentials. Please try again.');
    btn.disabled = false; btn.textContent = 'Sign In';
  }
});

// ---- REGISTER ---------------------------------------------
document.getElementById('register-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  hideAlert();

  const name     = document.getElementById('reg-name').value.trim();
  const email    = document.getElementById('reg-email').value.trim();
  const phone    = document.getElementById('reg-phone').value.trim();
  const password = document.getElementById('reg-password').value;
  const confirm  = document.getElementById('reg-confirm').value;
  let valid = true;

  document.getElementById('reg-name-err').classList.toggle('show', !name);
  if (!name) valid = false;

  const emailOk = email && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  document.getElementById('reg-email-err').classList.toggle('show', !emailOk);
  if (!emailOk) valid = false;

  document.getElementById('reg-pass-err').classList.toggle('show', password.length < 8);
  if (password.length < 8) valid = false;

  document.getElementById('reg-confirm-err').classList.toggle('show', password !== confirm);
  if (password !== confirm) valid = false;

  if (!valid) return;

  const btn = document.getElementById('register-btn');
  btn.disabled = true; btn.textContent = 'Creating account…';

  try {
    const res = await Auth.register({ fullName: name, email, phone: phone || null, password });
    setAuth(res.token, res.user);
    showAlert('Account created! Redirecting to dashboard…', 'success');
    setTimeout(() => redirectByRole(), 900);
  } catch (err) {
    showAlert(err.message || 'Registration failed. Please try again.');
    btn.disabled = false; btn.textContent = 'Create Account — It\'s Free';
  }
});
</script>
</body>
</html>
