<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="EasyCart SME Organizer Panel" />
  <title>Organizer Panel — EasyCart SME</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar" role="navigation">
  <div class="navbar-inner container">
    <a href="index.html" class="navbar-brand">
      <div class="logo-icon">🛒</div>
      <span class="brand-name">Easy<span>Cart</span> <small style="font-size:.65rem;opacity:.8">Organizer</small></span>
    </a>
    <div class="navbar-links" id="nav-links">
      <span style="color:var(--text-muted);font-size:.9rem;margin-right:10px" id="nav-org-name"></span>
      
      <button id="theme-toggle" class="theme-toggle" style="margin-right: 12px;">🌙</button>

      <span class="badge badge-organizer" style="margin-right:14px">ORGANIZER</span>
      <button class="btn btn-outline btn-sm" onclick="handleLogout()">Sign Out</button>
    </div>
  </div>
</nav>

<!-- APP LAYOUT -->
<div class="dashboard-grid">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-section">
      <div style="font-size: 0.75rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; padding: 0 1.25rem 1rem;">Organizer Menu</div>
      <a href="#" class="sidebar-link active" data-view="overview" onclick="showView('overview',this)">
        🏠 Overview
      </a>
      <a href="#" class="sidebar-link" data-view="families" onclick="showView('families',this)">
        👨‍👩‍👧‍👦 My Families
      </a>
      <a href="#" class="sidebar-link" data-view="members" onclick="showView('members',this)">
        👤 Members
      </a>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content">

    <!-- ======= OVERVIEW ======= -->
    <div id="view-overview" class="fade-in">
      <div class="page-header">
        <h1 class="page-title">Organizer Panel</h1>
      </div>

      <div class="stats-grid mb-6">
        <div class="card"><div style="color:var(--text-muted); font-size: 0.9rem;">My Families</div><div style="font-size: 2rem; font-weight: 800;" id="stat-my-families">—</div></div>
        <div class="card"><div style="color:var(--text-muted); font-size: 0.9rem;">Total Members</div><div style="font-size: 2rem; font-weight: 800;" id="stat-total-members">—</div></div>
        <div class="card"><div style="color:var(--text-muted); font-size: 0.9rem;">Active Now</div><div style="font-size: 2rem; font-weight: 800;" id="stat-active-members">—</div></div>
      </div>

      <div class="page-header mt-6">
        <h2 class="page-title" style="font-size: 1.25rem;">Quick View</h2>
      </div>
      <div id="family-cards" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px">
        <!-- Cards -->
      </div>
    </div>

    <!-- ======= FAMILIES VIEW ======= -->
    <div id="view-families" style="display:none" class="fade-in">
      <div class="page-header">
        <h2 class="page-title">My Families</h2>
      </div>
      <div class="table-container">
        <table>
          <thead>
            <tr><th>Family Name</th><th>Service & Plan</th><th>Status</th><th>Actions</th></tr>
          </thead>
          <tbody id="families-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- ======= MEMBERS VIEW ======= -->
    <div id="view-members" style="display:none" class="fade-in">
      <div class="page-header">
        <h2 class="page-title">Members</h2>
        <select id="family-select" class="form-control" style="width:240px" onchange="loadMembersForFamily(this.value)">
          <option value="">Select a family</option>
        </select>
      </div>
      <div class="table-container">
        <table>
          <thead>
            <tr><th>Name</th><th>Email</th><th>Status</th><th>Joined</th></tr>
          </thead>
          <tbody id="members-tbody"></tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/organizer.js"></script>
<script>
  // Theme Toggle logic
  const themeToggle = document.getElementById('theme-toggle');
  const html = document.documentElement;
  
  const savedTheme = localStorage.getItem('theme') || 'light';
  html.setAttribute('data-theme', savedTheme);
  themeToggle.textContent = savedTheme === 'light' ? '🌙' : '☀️';

  themeToggle.addEventListener('click', () => {
    const currentTheme = html.getAttribute('data-theme');
    const newTheme = currentTheme === 'light' ? 'dark' : 'light';
    html.setAttribute('data-theme', newTheme);
    localStorage.setItem('theme', newTheme);
    themeToggle.textContent = newTheme === 'light' ? '🌙' : '☀️';
  });
</script>
</body>
</html>
