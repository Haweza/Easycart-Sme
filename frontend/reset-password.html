<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Set a new password for your EasyCart SME account." />
  <title>Set New Password — EasyCart SME</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: radial-gradient(circle at top left, rgba(var(--primary-rgb), 0.05), transparent),
        radial-gradient(circle at bottom right, rgba(var(--accent-rgb), 0.05), transparent);
    }
  </style>
</head>

<body>

  <div class="card" style="width: 100%; max-width: 440px; padding: 2.5rem;">
    <!-- Logo -->
    <div style="text-align: center; margin-bottom: 2rem;">
      <a href="index.html" class="navbar-brand" style="justify-content: center;">
        <div class="logo-icon"><i class="fas fa-shopping-cart"></i></div>
        <span class="brand-name">Easy<span>Cart</span></span>
      </a>
      <h3 style="margin-top: 1.5rem; margin-bottom: 0.5rem; font-weight: 600;">Create New Password</h3>
      <p style="color: var(--text-muted); font-size: 0.9rem;">
        Enter and confirm your new account password.
      </p>
    </div>

    <!-- Alert -->
    <div id="auth-alert" class="alert" style="display:none; margin-bottom: 1.5rem;"></div>

    <!-- RESET PASSWORD FORM -->
    <form id="reset-form">
      <div class="form-group">
        <label class="form-label">New Password</label>
        <div class="password-wrapper">
          <input type="password" id="reset-password" class="form-control" placeholder="Min 8 characters" required minlength="8" />
          <button type="button" class="password-toggle" onclick="togglePasswordVisibility('reset-password')" title="Show/hide password">
            <i class="fas fa-eye"></i>
          </button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm New Password</label>
        <div class="password-wrapper">
          <input type="password" id="reset-confirm" class="form-control" placeholder="Re-enter password" required minlength="8" />
          <button type="button" class="password-toggle" onclick="togglePasswordVisibility('reset-confirm')" title="Show/hide password">
            <i class="fas fa-eye"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-full btn-lg mt-4" id="reset-btn">Reset Password</button>
    </form>

    <div style="text-align: center; margin-top: 2rem;">
      <a href="login.html" style="color: var(--text-muted); font-size: 0.85rem; font-weight: 500; text-decoration: none;">
        ← Back to Sign In
      </a>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script>
    // Toggle password visibility
    function togglePasswordVisibility(inputId) {
      const input = document.getElementById(inputId);
      const toggle = event.target.closest('.password-toggle');
      const icon = toggle.querySelector('i');

      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
      } else {
        input.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
      }
    }

    // Parse the token from URL hash (standard Supabase redirect format) or query string
    const getRecoveryToken = () => {
      // 1. Try URL Hash (e.g. #access_token=xyz&type=recovery)
      const hash = window.location.hash.substring(1);
      if (hash) {
        const params = new URLSearchParams(hash);
        const token = params.get('access_token');
        if (token) return token;
      }

      // 2. Try Query Params (e.g. ?token=xyz)
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get('token');
    };

    const token = getRecoveryToken();
    const alert = document.getElementById('auth-alert');
    const form = document.getElementById('reset-form');
    const btn = document.getElementById('reset-btn');

    // If no recovery token is found, display error and disable form
    if (!token) {
      alert.textContent = 'Invalid or expired password reset link. Please request a new link.';
      alert.className = 'alert alert-danger';
      alert.style.display = 'block';
      form.style.display = 'none';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('reset-password').value;
      const confirmPassword = document.getElementById('reset-confirm').value;

      if (password !== confirmPassword) {
        alert.textContent = 'Passwords do not match.';
        alert.className = 'alert alert-danger';
        alert.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Updating...';
      alert.style.display = 'none';

      try {
        await apiFetch('/auth/reset-password', {
          method: 'POST',
          body: {
            token: token,
            password: password
          }
        });

        alert.textContent = 'Your password has been reset successfully. Redirecting to login...';
        alert.className = 'alert alert-success';
        alert.style.display = 'block';
        btn.textContent = 'Success!';

        setTimeout(() => {
          window.location.replace('login.html');
        }, 2000);
      } catch (err) {
        alert.textContent = err.message || 'Failed to reset password. The link might be expired.';
        alert.className = 'alert alert-danger';
        alert.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Reset Password';
      }
    });
  </script>

</body>

</html>
